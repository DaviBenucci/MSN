<section class="msn-shop-hero msn-section msn-section--soft">
  <div class="msn-container msn-shop-hero__grid">
    <div>
      <p class="msn-eyebrow">Loja MSN Distribuidora</p>
      <h1 class="msn-title">Busca forte para encontrar o suprimento certo.</h1>
      <p class="msn-subtitle">Pesquise por produto, marca, modelo, codigo ou categoria. Os filtros devem usar dados reais do WooCommerce apos o saneamento do catalogo.</p>
    </div>

    <form class="msn-shop-search" role="search" method="get" action="/">
      <label for="msn-shop-search-field">Buscar na loja</label>
      <div>
        <input id="msn-shop-search-field" type="search" name="s" placeholder="Ex.: CE255X, HP, Samsung, toner preto">
        <input type="hidden" name="post_type" value="product">
        <button class="msn-button" type="submit">Pesquisar</button>
      </div>
    </form>
  </div>
</section>
