<div class="msn-header__main msn-container">
  <button class="msn-header__menu-button" type="button" aria-label="Abrir menu" aria-controls="msn-mobile-menu" aria-expanded="false" data-msn-menu-open>
    <span aria-hidden="true"></span>
    <span aria-hidden="true"></span>
    <span aria-hidden="true"></span>
  </button>

  <a class="msn-header__logo" href="/" aria-label="MSN Distribuidora - pagina inicial">
    <img src="https://msndistribuidora.com.br/wp-content/uploads/2025/10/LOGO_HD-Photoroom-300x212.png" alt="MSN Distribuidora" width="150" height="106" loading="eager">
    <span>
      <strong>MSN Distribuidora</strong>
      <small>Produtos para impressao</small>
    </span>
  </a>

  <form class="msn-header__search" role="search" method="get" action="/">
    <label class="msn-sr-only" for="msn-header-search">Buscar produtos</label>
    <input id="msn-header-search" type="search" name="s" placeholder="Buscar toner, cartucho, impressora ou codigo..." autocomplete="off">
    <input type="hidden" name="post_type" value="product">
    <button type="submit">Pesquisar</button>
  </form>

  <nav class="msn-header__actions" aria-label="Acoes do cliente">
    <a href="/minha-conta/">Conta</a>
    <a href="/minha-conta/orders/">Pedidos</a>
    <a class="msn-header__cart" href="/carrinho/" aria-label="Abrir carrinho">
      <svg class="msn-header__cart-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <circle cx="8" cy="21" r="1"></circle>
        <circle cx="19" cy="21" r="1"></circle>
        <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path>
      </svg>
      <span class="msn-header__cart-label">Carrinho</span>
      <span class="msn-header__cart-count" data-msn-cart-count aria-live="polite" hidden></span>
    </a>
    <span class="msn-theme-toggle msn-header__theme-toggle" data-msn-theme-toggle style="--msn-theme-index: 0" aria-label="Tema do site">
      <span class="msn-theme-toggle__track" aria-hidden="true"></span>
      <button class="msn-theme-toggle__button" type="button" data-msn-theme-choice="system" aria-label="Tema do sistema" aria-pressed="false" title="Tema do sistema">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect x="3" y="4" width="18" height="12" rx="2"></rect>
          <path d="M8 20h8"></path>
          <path d="M12 16v4"></path>
        </svg>
      </button>
      <button class="msn-theme-toggle__button" type="button" data-msn-theme-choice="light" aria-label="Modo claro" aria-pressed="false" title="Modo claro">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="m4.93 4.93 1.41 1.41"></path>
          <path d="m17.66 17.66 1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="m6.34 17.66-1.41 1.41"></path>
          <path d="m19.07 4.93-1.41 1.41"></path>
        </svg>
      </button>
      <button class="msn-theme-toggle__button" type="button" data-msn-theme-choice="dark" aria-label="Modo escuro" aria-pressed="false" title="Modo escuro">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M20.99 12.47A9 9 0 1 1 11.53 3a7 7 0 0 0 9.46 9.47Z"></path>
        </svg>
      </button>
    </span>
  </nav>
</div>
