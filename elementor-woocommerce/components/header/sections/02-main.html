<div class="msn-header__main msn-container">
  <a class="msn-header__logo" href="/" aria-label="MSN Distribuidora - pagina inicial">
    <img src="https://msndistribuidora.com.br/wp-content/uploads/2025/10/LOGO_HD-Photoroom-300x212.png" alt="MSN Distribuidora" width="150" height="106" loading="eager" fetchpriority="high" decoding="async">
    <span>
      <strong>MSN Distribuidora</strong>
      <small>Produtos para impressao</small>
    </span>
  </a>

  <div class="msn-header__search-slot" aria-label="Busca de produtos WooCommerce">
    <span class="msn-header__search-kicker">Buscar produto</span>
    <!-- Elementor: insira aqui um widget Shortcode com [msn_product_search]. -->
  </div>

  <nav class="msn-header__actions" aria-label="Acoes do cliente">
    <a class="msn-header__action-link" href="/minha-conta/">
      <span class="msn-header__action-icon" aria-hidden="true">C</span>
      <span>Conta</span>
    </a>
    <a class="msn-header__action-link" href="/minha-conta/orders/">
      <span class="msn-header__action-icon" aria-hidden="true">P</span>
      <span>Pedidos</span>
    </a>
    <a class="msn-header__cart msn-header__action-link" href="/carrinho/" aria-label="Abrir carrinho">
      <svg class="msn-header__cart-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <circle cx="8" cy="21" r="1"></circle>
        <circle cx="19" cy="21" r="1"></circle>
        <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path>
      </svg>
      <span class="msn-header__cart-label">Carrinho</span>
      <span class="msn-header__cart-count" data-msn-cart-count aria-live="polite" hidden></span>
    </a>
  </nav>
</div>
