<script>
  (function () {
    var focusableSelector = [
      "a[href]",
      "button:not([disabled])",
      "input:not([disabled])",
      "select:not([disabled])",
      "textarea:not([disabled])",
      '[tabindex]:not([tabindex="-1"])'
    ].join(",");

    function lockScroll(locked) {
      document.body.classList.toggle("msn-lock-scroll", locked);
    }

    function trapFocus(container, event) {
      if (event.key !== "Tab") return;
      var focusable = Array.prototype.slice.call(container.querySelectorAll(focusableSelector));
      if (!focusable.length) return;
      var first = focusable[0];
      var last = focusable[focusable.length - 1];

      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      }

      if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function escapeSelector(value) {
      if (window.CSS && typeof window.CSS.escape === "function") {
        return window.CSS.escape(value);
      }

      return String(value || "").replace(/["\\]/g, "\\$&");
    }

    function closestMercadoPagoField(element) {
      return element.closest(
        ".form-row, .mp-form-row, .mp-row, .mp-field, [class*='field'], [class*='input-container'], [class*='select-container']"
      ) || element.parentElement;
    }

    function closestMercadoPagoDocumentGroup(select) {
      var current = select.parentElement;
      var paymentBox = select.closest("#payment div.payment_box, #payment .payment_box");

      while (current && current !== document.documentElement && current !== paymentBox) {
        var hasSelect = current.querySelector("select");
        var hasDocumentInput = current.querySelector(
          'input:not([type="hidden"]):not([type="checkbox"]):not([type="radio"])'
        );

        if (hasSelect && hasDocumentInput) {
          return current;
        }

        current = current.parentElement;
      }

      return closestMercadoPagoField(select);
    }

    function findMercadoPagoDocumentInput(group, select) {
      if (!group) return null;

      var inputs = Array.prototype.slice.call(
        group.querySelectorAll('input:not([type="hidden"]):not([type="checkbox"]):not([type="radio"])')
      );

      return inputs.find(function (input) {
        return input !== select;
      }) || null;
    }

    function isMercadoPagoDocumentSelect(select) {
      return !!(select && select.matches([
        "#form-checkout__identificationType",
        'select[name="identificationType"]',
        'select[data-checkout="doc_type"]',
        'select[data-cy="select-document"]'
      ].join(",")));
    }

    function findMercadoPagoKnownDocumentInput(group, select) {
      return (group && group.querySelector(
        '#form-checkout__identificationNumber, input[name="identificationNumber"], input[data-checkout="doc_number"], input[data-cy="input-document"]'
      )) || findMercadoPagoDocumentInput(group, select);
    }

    function ensureMercadoPagoCpfOption(select) {
      var cpfOption = Array.prototype.slice.call(select.options || []).find(function (option) {
        return normalizeText(option.textContent || option.value).indexOf("cpf") !== -1;
      });

      if (!cpfOption && isMercadoPagoDocumentSelect(select) && !(select.options || []).length) {
        cpfOption = document.createElement("option");
        cpfOption.value = "CPF";
        cpfOption.textContent = "CPF";
        select.appendChild(cpfOption);
      }

      return cpfOption;
    }

    function selectLooksLikeDocument(select) {
      if (isMercadoPagoDocumentSelect(select)) return true;

      var options = Array.prototype.slice.call(select.options || []);
      var hasCpf = options.some(function (option) {
        return normalizeText(option.textContent || option.value).indexOf("cpf") !== -1;
      });

      if (!hasCpf) return false;

      var label = "";
      if (select.id) {
        var labelNode = document.querySelector('label[for="' + escapeSelector(select.id) + '"]');
        if (labelNode) label += " " + labelNode.textContent;
      }

      label += " " + [
        select.id,
        select.name,
        select.getAttribute("aria-label"),
        select.getAttribute("data-checkout"),
        select.getAttribute("data-cy"),
        closestMercadoPagoField(select) && closestMercadoPagoField(select).textContent
      ].join(" ");

      label = normalizeText(label);
      return /doc|document|identification|identificacao|titular|cpf|cnpj/.test(label);
    }

    function enforceMercadoPagoCpfOnly(scope) {
      var root = scope && scope.querySelectorAll ? scope : document;
      var selectors = [
        "#payment li[class*='payment_method_woo-mercado-pago'] .payment_box select",
        "#payment li[class*='payment_method_woo_mercado_pago'] .payment_box select",
        "#payment div.payment_box [class*='mp-'] select",
        "#payment div.payment_box [id*='mp-'] select",
        "#payment div.payment_box [class*='mercado'] select"
      ].join(",");

      Array.prototype.slice.call(root.querySelectorAll(selectors)).forEach(function (select) {
        if (!selectLooksLikeDocument(select)) return;

        var cpfOption = ensureMercadoPagoCpfOption(select);

        if (!cpfOption) return;

        Array.prototype.slice.call(select.options || []).forEach(function (option) {
          var isCpf = option === cpfOption;
          option.hidden = !isCpf;
          option.disabled = !isCpf;
        });

        if (select.value !== cpfOption.value) {
          select.value = cpfOption.value;
          select.dispatchEvent(new Event("input", { bubbles: true }));
          select.dispatchEvent(new Event("change", { bubbles: true }));
        }

        select.dataset.msnCpfOnly = "true";
        select.setAttribute("aria-hidden", "true");
        select.setAttribute("tabindex", "-1");

        var selectField = closestMercadoPagoField(select);
        var documentGroup = closestMercadoPagoDocumentGroup(select);
        var documentInput = findMercadoPagoKnownDocumentInput(documentGroup, select);
        var directSelectContainer = select.parentElement;

        if (selectField && selectField !== documentGroup && !findMercadoPagoDocumentInput(selectField, select)) {
          selectField.classList.add("msn-mp-document-type-field");
        }

        if (
          directSelectContainer &&
          directSelectContainer !== documentGroup &&
          !findMercadoPagoDocumentInput(directSelectContainer, select)
        ) {
          directSelectContainer.classList.add("msn-mp-document-type-field");
        }

        if (documentGroup) {
          documentGroup.classList.add("msn-mp-cpf-only-field");
        }

        if (documentInput) {
          documentInput.setAttribute("inputmode", "numeric");
          documentInput.setAttribute("autocomplete", "off");
          documentInput.setAttribute("maxlength", "11");
          documentInput.setAttribute("pattern", "\\d{11}");

          if (!documentInput.getAttribute("placeholder")) {
            documentInput.setAttribute("placeholder", "00000000000");
          }

          bindCheckoutInputFormatter(documentInput, formatCpfDigits);
        }
      });
    }

    function scheduleMercadoPagoCpfOnly(scope) {
      enforceMercadoPagoCpfOnly(scope);
      window.setTimeout(function () {
        enforceMercadoPagoCpfOnly(scope);
      }, 250);
    }

    function onlyDigits(value) {
      return String(value || "").replace(/\D+/g, "");
    }

    function formatCpf(value) {
      var digits = onlyDigits(value).slice(0, 11);
      if (digits.length <= 3) return digits;
      if (digits.length <= 6) return digits.replace(/(\d{3})(\d+)/, "$1.$2");
      if (digits.length <= 9) return digits.replace(/(\d{3})(\d{3})(\d+)/, "$1.$2.$3");
      return digits.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, "$1.$2.$3-$4");
    }

    function formatCpfDigits(value) {
      return onlyDigits(value).slice(0, 11);
    }

    function formatBrazilPhone(value) {
      var digits = onlyDigits(value).slice(0, 11);
      if (digits.length <= 2) return digits;
      if (digits.length <= 6) return digits.replace(/(\d{2})(\d+)/, "($1) $2");
      if (digits.length <= 10) return digits.replace(/(\d{2})(\d{4})(\d+)/, "($1) $2-$3");
      return digits.replace(/(\d{2})(\d{5})(\d+)/, "($1) $2-$3");
    }

    function bindCheckoutInputFormatter(input, formatter) {
      if (!input || input.dataset.msnCheckoutFormatter === "true") return;
      input.dataset.msnCheckoutFormatter = "true";

      input.addEventListener("input", function () {
        var start = input.selectionStart;
        var beforeLength = input.value.length;
        input.value = formatter(input.value);

        if (typeof start === "number" && document.activeElement === input) {
          var diff = input.value.length - beforeLength;
          var next = Math.max(0, start + diff);
          input.setSelectionRange(next, next);
        }
      });

      input.value = formatter(input.value);
    }

    function markCheckoutFieldRequired(input) {
      if (!input) return;

      input.required = true;
      input.setAttribute("aria-required", "true");

      var field = input.closest(".form-row, p, .wc-block-components-text-input");
      if (!field) return;

      field.classList.add("validate-required");
      field.classList.remove("validate-optional");

      Array.prototype.slice.call(field.querySelectorAll(".optional")).forEach(function (optional) {
        optional.remove();
      });
    }

    function formatCheckoutIdentityFields(scope) {
      var root = scope && scope.querySelectorAll ? scope : document;
      Array.prototype.slice.call(root.querySelectorAll('input[name="billing_cpf"], #billing_cpf')).forEach(function (input) {
        markCheckoutFieldRequired(input);
        bindCheckoutInputFormatter(input, formatCpf);
      });
      Array.prototype.slice.call(root.querySelectorAll('input[name="billing_phone"], #billing_phone')).forEach(function (input) {
        markCheckoutFieldRequired(input);
        bindCheckoutInputFormatter(input, formatBrazilPhone);
      });
    }

    function scheduleCheckoutIdentityFields(scope) {
      formatCheckoutIdentityFields(scope);
      window.setTimeout(function () {
        formatCheckoutIdentityFields(scope);
      }, 250);
    }

    var mobilePaymentPanelMedia = window.matchMedia ? window.matchMedia("(max-width: 768px)") : null;

    function isMobilePaymentPanelLayout() {
      return mobilePaymentPanelMedia ? mobilePaymentPanelMedia.matches : window.innerWidth <= 768;
    }

    function directPaymentRadio(method) {
      var radios = Array.prototype.slice.call(method.querySelectorAll('input[type="radio"]'));
      return radios.find(function (radio) {
        return radio.parentElement === method;
      }) || radios[0] || null;
    }

    function directPaymentBoxes(method) {
      return Array.prototype.slice.call(method.children || []).filter(function (child) {
        return child.classList && child.classList.contains("payment_box");
      });
    }

    function syncCheckoutPaymentPanels(scope) {
      var root = scope && scope.querySelectorAll ? scope : document;
      var isMobile = isMobilePaymentPanelLayout();
      var methods = Array.prototype.slice.call(
        root.querySelectorAll("#payment li.wc_payment_method, #payment li[class*='payment_method_']")
      );

      methods.forEach(function (method) {
        var radio = directPaymentRadio(method);
        var boxes = directPaymentBoxes(method);
        var isSelected = radio ? radio.checked : true;

        if (!boxes.length) return;

        method.classList.toggle("msn-payment-method--open", isMobile && isSelected);
        method.classList.toggle("msn-payment-method--collapsed", isMobile && !isSelected);

        if (radio) {
          radio.setAttribute("aria-expanded", String(isMobile && isSelected));
        }

        boxes.forEach(function (box) {
          if (!isMobile) {
            if (box.dataset.msnMobilePaymentPanel === "true") {
              box.hidden = false;
              box.removeAttribute("aria-hidden");
              box.style.removeProperty("display");
              delete box.dataset.msnMobilePaymentPanel;
            }
            return;
          }

          box.dataset.msnMobilePaymentPanel = "true";
          box.hidden = !isSelected;
          box.setAttribute("aria-hidden", String(!isSelected));

          if (isSelected) {
            box.style.removeProperty("display");
          } else {
            box.style.setProperty("display", "none", "important");
          }
        });
      });
    }

    function scheduleCheckoutPaymentPanels(scope) {
      syncCheckoutPaymentPanels(scope);
      window.setTimeout(function () {
        syncCheckoutPaymentPanels(scope);
      }, 120);
      window.setTimeout(function () {
        syncCheckoutPaymentPanels(scope);
      }, 320);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        scheduleMercadoPagoCpfOnly(document);
        scheduleCheckoutIdentityFields(document);
        scheduleCheckoutPaymentPanels(document);
      });
    } else {
      scheduleMercadoPagoCpfOnly(document);
      scheduleCheckoutIdentityFields(document);
      scheduleCheckoutPaymentPanels(document);
    }

    document.addEventListener("change", function (event) {
      if (event.target && event.target.closest && event.target.closest("#payment")) {
        scheduleMercadoPagoCpfOnly(document);
        scheduleCheckoutPaymentPanels(document);
      }
    });

    if (window.jQuery) {
      window.jQuery(document.body).on(
        "updated_checkout payment_method_selected checkout_error",
        function () {
          scheduleMercadoPagoCpfOnly(document);
          scheduleCheckoutIdentityFields(document);
          scheduleCheckoutPaymentPanels(document);
        }
      );
    }

    if (mobilePaymentPanelMedia) {
      var handlePaymentPanelMediaChange = function () {
        scheduleCheckoutPaymentPanels(document);
      };

      if (typeof mobilePaymentPanelMedia.addEventListener === "function") {
        mobilePaymentPanelMedia.addEventListener("change", handlePaymentPanelMediaChange);
      } else if (typeof mobilePaymentPanelMedia.addListener === "function") {
        mobilePaymentPanelMedia.addListener(handlePaymentPanelMediaChange);
      }
    }

    var paymentRoot = document.getElementById("payment");
    if (paymentRoot && window.MutationObserver) {
      new MutationObserver(function () {
        scheduleMercadoPagoCpfOnly(paymentRoot);
        scheduleCheckoutIdentityFields(paymentRoot);
        scheduleCheckoutPaymentPanels(paymentRoot);
      }).observe(paymentRoot, { childList: true, subtree: true });
    }

    window.MSNStorefront = {
      focusableSelector: focusableSelector,
      lockScroll: lockScroll,
      trapFocus: trapFocus,
      enforceMercadoPagoCpfOnly: enforceMercadoPagoCpfOnly,
      formatCheckoutIdentityFields: formatCheckoutIdentityFields,
      syncCheckoutPaymentPanels: syncCheckoutPaymentPanels
    };
  })();

</script>
