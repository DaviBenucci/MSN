<style>
:root {
	color-scheme: light;
	--msn-primary: #0f3d5e;
	--msn-primary-dark: #082f49;
	--msn-primary-soft: #eaf4ff;
	--msn-accent: #0ea5e9;
	--msn-success: #10b981;
	--msn-warning: #f97316;
	--msn-danger: #ef4444;
	--msn-bg: #f4f7fa;
	--msn-bg-soft: #eef6fb;
	--msn-surface: #ffffff;
	--msn-surface-alt: #f8fafc;
	--msn-surface-strong: #ffffff;
	--msn-text: #111827;
	--msn-muted: #64748b;
	--msn-border: #dbe7f0;
	--msn-border-strong: #bfdbfe;
	--msn-shadow: 0 18px 45px rgba(15, 61, 94, 0.12);
	--msn-shadow-soft: 0 12px 30px rgba(15, 23, 42, 0.07);
	--msn-ring: 0 0 0 4px rgba(14, 165, 233, 0.14);
	--msn-radius: 8px;
	--msn-radius-lg: 12px;
	--msn-section-y: clamp(28px, 4vw, 48px);
	--msn-section-y-tight: clamp(16px, 2.5vw, 28px);
	--msn-font-sans: Inter, Roboto, Arial, sans-serif;
	--msn-font-display: Poppins, Montserrat, Inter, Roboto, Arial, sans-serif;
}

html {
	box-sizing: border-box;
	overflow-x: clip;
	scroll-behavior: smooth;
	background: var(--msn-bg);
}

*,
*::before,
*::after {
	box-sizing: inherit;
}

body {
	margin: 0;
	min-width: 320px;
	overflow-x: clip;
	background: var(--msn-bg);
	color: var(--msn-text);
	font-family: var(--msn-font-sans);
	text-rendering: optimizeLegibility;
	-webkit-font-smoothing: antialiased;
	transition: background-color 220ms ease, color 220ms ease;
}

body.msn-lock-scroll {
	overflow: hidden;
}

.msn-sr-only {
	position: absolute;
	width: 1px;
	height: 1px;
	padding: 0;
	overflow: hidden;
	clip: rect(0, 0, 0, 0);
	white-space: nowrap;
	border: 0;
}

.msn-container {
	width: min(calc(100% - 32px), 1180px);
	margin-inline: auto;
}

.msn-section {
	padding-block: var(--msn-section-y);
}

.msn-section + .msn-section {
	padding-top: var(--msn-section-y-tight);
}

.msn-section--soft {
	background: linear-gradient(180deg, var(--msn-bg-soft) 0%, var(--msn-bg) 100%);
}

.msn-checkout-hero,
.msn-cart-hero,
.msn-account-hero,
.msn-contact-hero,
.msn-returns-hero,
.msn-privacy-hero {
	padding-block: clamp(20px, 3vw, 34px);
}

.msn-checkout-hero + .msn-section,
.msn-cart-hero + .msn-section,
.msn-account-hero + .msn-section,
.msn-contact-hero + .msn-section,
.msn-returns-hero + .msn-section,
.msn-privacy-hero + .msn-section {
	padding-top: clamp(12px, 2vw, 22px);
}

.msn-eyebrow {
	display: inline-flex;
	align-items: center;
	gap: 8px;
	border: 1px solid var(--msn-border);
	border-radius: 999px;
	background: color-mix(in srgb, var(--msn-surface) 88%, transparent);
	padding: 7px 12px;
	color: var(--msn-primary);
	font-size: 0.78rem;
	font-weight: 850;
}

.msn-title {
	margin: 0;
	color: var(--msn-primary);
	font-family: var(--msn-font-display);
	font-size: clamp(2rem, 5vw, 3.35rem);
	line-height: 1.06;
	letter-spacing: 0;
}

.msn-subtitle {
	margin: 16px 0 0;
	color: var(--msn-muted);
	font-size: clamp(1rem, 2vw, 1.12rem);
	line-height: 1.72;
}

.msn-button,
.woocommerce a.button,
.woocommerce button.button,
.woocommerce input.button,
.woocommerce #respond input#submit {
	display: inline-flex;
	min-height: 44px;
	align-items: center;
	justify-content: center;
	gap: 8px;
	border: 1px solid var(--msn-primary);
	border-radius: var(--msn-radius);
	background: var(--msn-primary);
	color: #ffffff !important;
	padding: 12px 18px;
	font-size: 0.95rem;
	font-weight: 850;
	line-height: 1.1;
	text-decoration: none !important;
	transition: transform 180ms ease, background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
}

.msn-button:hover,
.woocommerce a.button:hover,
.woocommerce button.button:hover,
.woocommerce input.button:hover,
.woocommerce #respond input#submit:hover {
	background: var(--msn-primary-dark);
	border-color: var(--msn-primary-dark);
	box-shadow: var(--msn-shadow);
	transform: translateY(-1px);
}

.msn-button--secondary {
	background: var(--msn-primary-soft);
	border-color: var(--msn-border-strong);
	color: var(--msn-primary) !important;
}

.msn-button--secondary:hover {
	background: color-mix(in srgb, var(--msn-primary-soft) 78%, var(--msn-surface));
	border-color: var(--msn-accent);
	color: var(--msn-primary) !important;
}

.msn-button--whatsapp {
	background: var(--msn-success);
	border-color: var(--msn-success);
	color: #ffffff !important;
}

.msn-button--whatsapp:hover {
	background: #059669;
	border-color: #059669;
	color: #ffffff !important;
}

.msn-button--ghost {
	background: transparent;
	border-color: var(--msn-border);
	color: var(--msn-primary) !important;
}

.msn-button--ghost:hover,
.msn-chip:hover {
	background: var(--msn-primary-soft);
	border-color: var(--msn-accent);
	color: var(--msn-primary) !important;
}

.msn-grid {
	display: grid;
	gap: 18px;
}

.msn-grid--2 {
	grid-template-columns: repeat(2, minmax(0, 1fr));
}

.msn-grid--3 {
	grid-template-columns: repeat(3, minmax(0, 1fr));
}

.msn-grid--4 {
	grid-template-columns: repeat(4, minmax(0, 1fr));
}

.msn-card {
	position: relative;
	overflow: hidden;
	border: 1px solid var(--msn-border);
	border-radius: var(--msn-radius);
	background: var(--msn-surface);
	padding: 22px;
	box-shadow: var(--msn-shadow-soft);
}

.msn-card::before {
	content: "";
	position: absolute;
	inset: 0 0 auto;
	height: 3px;
	background: linear-gradient(90deg, #1e73be 0%, #0ea5e9 58%, #10b981 100%);
	opacity: 0.7;
}

.msn-card h2,
.msn-card h3 {
	margin: 0;
	color: var(--msn-primary);
	font-family: var(--msn-font-display);
	letter-spacing: 0;
}

.msn-card p {
	margin: 10px 0 0;
	color: var(--msn-muted);
	line-height: 1.65;
}

.msn-chip {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	border: 1px solid var(--msn-border);
	border-radius: 999px;
	background: var(--msn-surface);
	color: var(--msn-primary);
	padding: 8px 12px;
	font-size: 0.85rem;
	font-weight: 850;
	text-decoration: none;
}

.msn-trust-strip {
	display: grid;
	grid-template-columns: repeat(4, minmax(0, 1fr));
	gap: 12px;
}

.msn-trust-item {
	border: 1px solid var(--msn-border);
	border-left: 3px solid var(--msn-accent);
	border-radius: var(--msn-radius);
	background: var(--msn-surface);
	padding: 16px;
	box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
}

.msn-trust-item strong,
.msn-trust-item span {
	display: block;
}

.msn-trust-item strong {
	color: var(--msn-primary);
	font-weight: 850;
}

.msn-trust-item span {
	margin-top: 4px;
	color: var(--msn-muted);
	font-size: 0.92rem;
	line-height: 1.55;
}

.msn-form {
	display: grid;
	gap: 14px;
}

.msn-form label {
	display: grid;
	gap: 6px;
	color: var(--msn-primary);
	font-weight: 850;
}

.msn-form input,
.msn-form select,
.msn-form textarea,
.woocommerce form .form-row input.input-text,
.woocommerce form .form-row textarea,
.woocommerce form .form-row select,
.woocommerce input.input-text,
.woocommerce select,
.woocommerce textarea {
	width: 100%;
	min-height: 44px;
	border: 1px solid var(--msn-border);
	border-radius: var(--msn-radius);
	background: var(--msn-surface);
	color: var(--msn-text);
	padding: 12px 14px;
	font: inherit;
}

.msn-form input::placeholder,
.msn-form textarea::placeholder,
.woocommerce input.input-text::placeholder,
.woocommerce textarea::placeholder {
	color: color-mix(in srgb, var(--msn-muted) 74%, transparent);
}

.msn-form textarea {
	min-height: 120px;
	resize: vertical;
}

.msn-form input:focus,
.msn-form select:focus,
.msn-form textarea:focus,
.woocommerce form .form-row input.input-text:focus,
.woocommerce form .form-row textarea:focus,
.woocommerce form .form-row select:focus,
.woocommerce input.input-text:focus,
.woocommerce select:focus,
.woocommerce textarea:focus {
	border-color: var(--msn-accent);
	box-shadow: var(--msn-ring);
	outline: 0;
}

.msn-honeypot {
	position: absolute;
	left: -9999px;
	opacity: 0;
	pointer-events: none;
}

.woocommerce .woocommerce-info,
.woocommerce .woocommerce-message,
.woocommerce .woocommerce-error {
	border-top-color: var(--msn-accent);
	border-radius: var(--msn-radius);
	background: var(--msn-primary-soft);
	color: var(--msn-text);
}

.woocommerce .woocommerce-error {
	border-top-color: var(--msn-danger);
	background: color-mix(in srgb, var(--msn-danger) 10%, var(--msn-surface));
}

.woocommerce ul.products {
	display: grid;
	grid-template-columns: repeat(4, minmax(0, 1fr));
	gap: 18px;
}

.woocommerce ul.products::before,
.woocommerce ul.products::after {
	display: none;
}

.woocommerce ul.products li.product {
	display: flex;
	min-height: 100%;
	flex-direction: column;
	width: auto !important;
	margin: 0 !important;
	border: 1px solid var(--msn-border);
	border-radius: var(--msn-radius);
	background: var(--msn-surface);
	padding: 14px !important;
	box-shadow: var(--msn-shadow-soft);
	text-align: left;
}

.woocommerce ul.products li.product img {
	aspect-ratio: 1 / 1;
	border-radius: var(--msn-radius);
	background: var(--msn-surface-alt);
	object-fit: contain;
	padding: clamp(12px, 2vw, 18px);
}

.woocommerce ul.products li.product .woocommerce-loop-product__title {
	min-height: 3.4em;
	margin-top: 12px;
	color: var(--msn-primary);
	font-family: var(--msn-font-display);
	font-size: 1rem;
	font-weight: 850;
	line-height: 1.35;
}

.woocommerce div.product p.price,
.woocommerce div.product span.price,
.woocommerce ul.products li.product .price {
	color: var(--msn-primary) !important;
	font-size: 1.16rem;
	font-weight: 900;
}

.woocommerce ul.products li.product .price {
	margin-top: auto;
	padding-top: 10px;
}

.woocommerce ul.products li.product .button {
	width: 100%;
	margin-top: 12px;
	white-space: normal;
}

.woocommerce span.onsale {
	min-height: auto;
	border-radius: 999px;
	background: var(--msn-warning);
	color: #ffffff;
	padding: 6px 10px;
	font-size: 0.78rem;
	font-weight: 900;
	line-height: 1;
}

.woocommerce div.product .stock {
	color: var(--msn-success);
	font-weight: 850;
}

.woocommerce table.shop_table,
.woocommerce table.shop_table td,
.woocommerce table.shop_table th {
	border-color: var(--msn-border);
}

.woocommerce table.shop_table {
	border-radius: var(--msn-radius);
	background: var(--msn-surface);
	color: var(--msn-text);
	overflow: hidden;
}

.woocommerce table.shop_table th {
	color: var(--msn-primary);
}

.woocommerce table.shop_table td {
	color: var(--msn-text);
}

.woocommerce .cart_totals,
.woocommerce-checkout-review-order,
.woocommerce-checkout #payment,
.woocommerce form.checkout_coupon,
.woocommerce form.login,
.woocommerce form.register {
	border-color: var(--msn-border) !important;
	border-radius: var(--msn-radius) !important;
	background: var(--msn-surface) !important;
	color: var(--msn-text);
}

.woocommerce-checkout #payment div.payment_box {
	background: var(--msn-surface-alt);
	color: var(--msn-text);
}

.woocommerce-checkout #payment div.payment_box::before {
	border-bottom-color: var(--msn-surface-alt);
}

.cmplz-cookiebanner,
#cmplz-cookiebanner-container .cmplz-cookiebanner {
	position: fixed !important;
	inset: auto 16px max(12px, env(safe-area-inset-bottom)) 16px !important;
	z-index: 9998 !important;
	left: 16px !important;
	right: 16px !important;
	bottom: max(12px, env(safe-area-inset-bottom)) !important;
	width: min(1120px, calc(100vw - 32px)) !important;
	max-width: calc(100vw - 32px) !important;
	max-height: min(34vh, 230px) !important;
	margin-inline: auto !important;
	overflow-y: auto !important;
	border: 1px solid var(--msn-border) !important;
	border-radius: var(--msn-radius) !important;
	background: color-mix(in srgb, var(--msn-surface) 96%, transparent) !important;
	color: var(--msn-text) !important;
	padding: 14px 16px !important;
	box-shadow: 0 16px 42px rgba(15, 23, 42, 0.16) !important;
	backdrop-filter: blur(14px);
}

.cmplz-cookiebanner .cmplz-header,
.cmplz-cookiebanner .cmplz-body,
.cmplz-cookiebanner .cmplz-buttons,
.cmplz-cookiebanner .cmplz-links {
	max-width: 100% !important;
}

.cmplz-cookiebanner .cmplz-title {
	color: var(--msn-primary) !important;
	font-family: var(--msn-font-display);
	font-size: 1rem !important;
	line-height: 1.2 !important;
}

.cmplz-cookiebanner .cmplz-message,
.cmplz-cookiebanner .cmplz-categories,
.cmplz-cookiebanner .cmplz-links {
	color: var(--msn-text) !important;
	font-size: 0.88rem !important;
	line-height: 1.5 !important;
}

.cmplz-cookiebanner .cmplz-buttons {
	display: flex !important;
	flex-wrap: wrap !important;
	gap: 8px !important;
	margin-top: 10px !important;
}

.cmplz-cookiebanner .cmplz-buttons .cmplz-btn {
	min-height: 40px !important;
	flex: 1 1 140px !important;
	border-radius: var(--msn-radius) !important;
	font-weight: 850 !important;
	line-height: 1.15 !important;
	white-space: normal !important;
}

body:has(.cmplz-cookiebanner.cmplz-show).woocommerce-checkout,
body:has(.cmplz-cookiebanner.cmplz-show).woocommerce-cart,
body:has(.cmplz-cookiebanner.cmplz-show).woocommerce-account,
body:has(.cmplz-cookiebanner.cmplz-show).single-product {
	padding-bottom: clamp(118px, 20vh, 180px);
}

@media (max-width: 1024px) {
	.msn-grid--4,
	.woocommerce ul.products {
		grid-template-columns: repeat(2, minmax(0, 1fr));
	}

	.msn-grid--3 {
		grid-template-columns: repeat(2, minmax(0, 1fr));
	}

	.msn-trust-strip {
		grid-template-columns: repeat(2, minmax(0, 1fr));
	}
}

@media (max-width: 640px) {
	.msn-container {
		width: min(calc(100% - 24px), 1180px);
	}

	.msn-grid--2,
	.msn-grid--3,
	.msn-grid--4,
	.woocommerce ul.products,
	.msn-trust-strip {
		grid-template-columns: 1fr;
	}

	.msn-button {
		width: 100%;
	}

	.cmplz-cookiebanner,
	#cmplz-cookiebanner-container .cmplz-cookiebanner {
		inset: auto 10px max(10px, env(safe-area-inset-bottom)) 10px !important;
		left: 10px !important;
		right: 10px !important;
		width: calc(100vw - 20px) !important;
		max-width: calc(100vw - 20px) !important;
		max-height: min(42vh, 300px) !important;
		padding: 12px !important;
	}

	body:has(.cmplz-cookiebanner.cmplz-show).woocommerce-checkout,
	body:has(.cmplz-cookiebanner.cmplz-show).woocommerce-cart,
	body:has(.cmplz-cookiebanner.cmplz-show).woocommerce-account,
	body:has(.cmplz-cookiebanner.cmplz-show).single-product {
		padding-bottom: clamp(150px, 44vh, 320px);
	}
}

@media (prefers-reduced-motion: reduce) {
	*,
	*::before,
	*::after {
		animation-duration: 0.01ms !important;
		animation-iteration-count: 1 !important;
		scroll-behavior: auto !important;
		transition-duration: 0.01ms !important;
	}
}
</style>
